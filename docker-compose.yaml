name: database-project

services:

  mysql:
    image: mysql:9.6.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3307:3306"
    volumes:
      - ./data/database:/var/lib/mysql
      # On a fresh volume (docker compose down -v), MySQL runs these scripts automatically.
      # On an existing volume, they are ignored (initdb.d only fires on first boot).
      - ./data/sql/05_rolap_warehouse.sql:/docker-entrypoint-initdb.d/05_rolap_warehouse.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  mdb-loader:
    build: config/mdb-loader
    container_name: mdb-loader
    platform: linux/amd64
    volumes:
      - ./data/sources:${MDB_DIRECTORY}
    environment:
      MYSQL_URL: ${MYSQL_URL}
      MDB_DIRECTORY: ${MDB_DIRECTORY}
    depends_on:
      mysql:
        condition: service_healthy

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "8081:8080"

  webspoon:
    build: config/webspoon
    container_name: webspoon
    platform: linux/amd64
    ports:
      - "8085:8080"
    volumes:
      - ./data/pentaho:/etl
      - ./data/sources:/access
      - ./data/pentaho/drivers:/usr/local/tomcat/lib:ro
      - ./data/pentaho/drivers:/usr/share/webspoon/kettle/plugins/databases
      - ./data/pentaho/drivers:/data-integration/lib/ext

  pdi:
    image: zhicwu/pdi-ce:8.0
    container_name: pdi
    platform: linux/amd64
    ports:
      - "8082:8080"
    volumes:
      - ./data/pentaho:/data
      - ./data/sources:/access
      - ./data/pentaho/drivers:/data-integration/lib/ext

  pentaho-server:
    image: oliveiha/pentaho-server:9.4.7_openjdk8
    container_name: pentaho-server
    platform: linux/amd64
    ports:
      - "8083:8080"
    depends_on:
      - mysql

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "8084:3000"

  setup:
    build: config/setup
    container_name: setup
    platform: linux/amd64
    restart: "no"
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      mdb-loader:
        condition: service_started
      metabase:
        condition: service_started
      pentaho-server:
        condition: service_started
    volumes:
      - ./data/sql:/sql:ro
      - ./data/olap:/mondrian:ro
